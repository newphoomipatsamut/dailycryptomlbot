name: Daily ML Bot

on:
  schedule:
    - cron: '5 0 * * *'   # runs 00:05 UTC every day
  workflow_dispatch:        # allows manual run from GitHub UI

permissions:
  contents: write            # needed to commit state + trade log back to repo

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements_daily.txt

      - name: Run bot
        env:
          KRAKEN_API_KEY:    ${{ secrets.KRAKEN_API_KEY }}
          KRAKEN_SECRET:     ${{ secrets.KRAKEN_SECRET }}
          PAPER_MODE:        "true"
          PAPER_BALANCE:     "10000"
        run: python crypto_daily_ml_v3.py

      - name: Commit state and trade log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -f DailyTrades.csv ]  && git add DailyTrades.csv
          [ -f DailySignals.csv ] && git add DailySignals.csv
          [ -f DailyMeta.json ]   && git add DailyMeta.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily ml bot run $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin $(git rev-parse --abbrev-ref HEAD) 2>/dev/null || true
            git push
          fi
